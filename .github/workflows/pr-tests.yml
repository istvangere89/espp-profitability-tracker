name: Pull Request Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'infrastructure/**'
      - 'scripts/**'
      - '.github/workflows/**'

env:
  PYTHON_VERSION: '3.11'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r infrastructure/cdk/requirements.txt
      
      - name: Validate Python syntax
        run: |
          echo "🔍 Checking Python files..."
          python -m py_compile scripts/deploy.py
          python -m py_compile scripts/check_aws_setup.py
          python -m py_compile scripts/test_lambda.py
          python -m py_compile dev/proxy_server.py
          python -m py_compile infrastructure/cdk/app.py
          python -m py_compile infrastructure/cdk/stacks/__init__.py
          python -m py_compile infrastructure/cdk/stacks/stock_tracker_stack.py
          python -m py_compile infrastructure/lambda/cors_proxy/index.py
          echo "✅ All Python files are valid!"
      
      - name: Run Lambda tests
        run: |
          echo "🧪 Testing Lambda handler..."
          python scripts/test_lambda.py
          echo "✅ Lambda tests passed!"
      
      - name: Validate CDK Synth
        run: |
          echo "🔧 Installing AWS CDK..."
          npm install -g aws-cdk
          
          echo "📦 Synthesizing CDK stack..."
          cd infrastructure/cdk
          cdk synth
          echo "✅ CDK synth successful!"
      
      - name: Check JavaScript files
        run: |
          echo "🔍 Checking JavaScript syntax..."
          node --check src/js/api.js
          node --check src/js/app.js
          node --check src/js/calculator.js
          node --check src/js/storage.js
          echo "✅ All JavaScript files are valid!"
      
      - name: Validate HTML
        run: |
          echo "🔍 Checking HTML structure..."
          if [ -f "src/index.html" ]; then
            echo "✅ index.html exists"
          else
            echo "❌ index.html not found"
            exit 1
          fi
      
      - name: Check for secrets
        run: |
          echo "🔒 Checking for exposed secrets..."
          if grep -r "aws_access_key_id\|aws_secret_access_key\|password\|API_KEY" src/ infrastructure/ scripts/ --exclude-dir=__pycache__ || true; then
            echo "⚠️  Potential secrets found - please review"
          else
            echo "✅ No exposed secrets detected"
          fi

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: test
    if: always()
    
    steps:
      - name: Tests Passed
        if: needs.test.result == 'success'
        run: |
          echo "✅ All tests passed!"
          echo "This PR is ready for review."
      
      - name: Tests Failed
        if: needs.test.result == 'failure'
        run: |
          echo "❌ Tests failed!"
          echo "Please fix the issues before merging."
          exit 1
