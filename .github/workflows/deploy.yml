name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

env:
  AWS_REGION: eu-central-1
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '24'

# Required for OIDC authentication
permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r infrastructure/cdk/requirements.txt
      
      - name: Run Lambda tests
        run: |
          python scripts/test_lambda.py
      
      - name: Validate Python syntax
        run: |
          python -m py_compile scripts/deploy.py
          python -m py_compile scripts/check_aws_setup.py
          python -m py_compile scripts/test_lambda.py
          python -m py_compile infrastructure/cdk/app.py
          python -m py_compile infrastructure/cdk/stacks/stock_tracker_stack.py
          python -m py_compile infrastructure/lambda/cors_proxy/index.py
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install AWS CDK
        run: |
          npm install -g aws-cdk
          cdk --version
      
      - name: CDK Synth
        working-directory: infrastructure/cdk
        run: |
          cdk synth

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ROLE_ARN }}
          role-session-name: GitHubActions-Deploy
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Install AWS CDK
        run: |
          npm install -g aws-cdk
          cdk --version
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r infrastructure/cdk/requirements.txt
      
      - name: CDK Bootstrap (if needed)
        working-directory: infrastructure/cdk
        run: |
          # Bootstrap both regions (us-east-1 for WAF, eu-central-1 for main stack)
          cdk bootstrap aws://unknown-account/us-east-1 || true
          cdk bootstrap aws://unknown-account/${{ env.AWS_REGION }} || true
      
      - name: CDK Synth
        working-directory: infrastructure/cdk
        run: |
          cdk synth
      
      - name: CDK Deploy
        working-directory: infrastructure/cdk
        run: |
          cdk deploy --all --require-approval never --outputs-file outputs.json
      
      - name: Update API endpoint in frontend
        run: |
          # Extract API URL from CDK outputs
          API_URL=$(jq -r '.EpamStockTrackerStack.ApiUrlForConfig' infrastructure/cdk/outputs.json)
          echo "API Gateway URL: $API_URL"
          
          # Update api.js with the new endpoint
          sed -i "s|http://localhost:8080?url=|$API_URL|g" src/js/api.js
          
          echo "✅ Frontend updated with API Gateway endpoint"
      
      - name: Redeploy with updated frontend
        working-directory: infrastructure/cdk
        run: |
          echo "📤 Redeploying with updated frontend files..."
          cdk deploy EpamStockTrackerStack --require-approval never
      
      - name: Get deployment outputs
        working-directory: infrastructure/cdk
        run: |
          echo "📊 Deployment Outputs:"
          cdk output
          
          echo ""
          echo "🎉 Deployment complete!"
          echo "Website URL: $(jq -r '.EpamStockTrackerStack.WebsiteURL' outputs.json)"
          echo "API Gateway URL: $(jq -r '.EpamStockTrackerStack.ApiUrlForConfig' outputs.json)"
      
      - name: Upload outputs artifact
        uses: actions/upload-artifact@v4
        with:
          name: cdk-outputs
          path: infrastructure/cdk/outputs.json
          retention-days: 30

  notify:
    name: Deployment Status
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    
    steps:
      - name: Deployment Success
        if: needs.deploy.result == 'success'
        run: |
          echo "✅ Deployment successful!"
          echo "Your EPAM Stock Tracker is now live!"
      
      - name: Deployment Failed
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ Deployment failed!"
          echo "Check the logs above for details."
          exit 1
